# WebSecCheck — Nginx configuration
# Replace YOUR_DOMAIN with your actual domain name or server IP.
# SSL certificates must be generated before enabling HTTPS.
#
# Generate self-signed cert:
#   openssl req -x509 -nodes -days 365 -newkey rsa:4096 \
#     -keyout /etc/ssl/webseccheck/key.pem \
#     -out /etc/ssl/webseccheck/cert.pem

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=scan_start:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=general:10m    rate=60r/m;
limit_req_zone $binary_remote_addr zone=api:10m        rate=30r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/ssl/webseccheck/cert.pem;
    ssl_certificate_key /etc/ssl/webseccheck/key.pem;

    # Modern TLS configuration
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_buffer_size     8k;

    # OCSP stapling (enable if using CA-signed cert)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 10m;
    client_body_timeout  30s;
    client_header_timeout 30s;
    keepalive_timeout    65s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Logging
    access_log /var/log/nginx/webseccheck_access.log combined;
    error_log  /var/log/nginx/webseccheck_error.log warn;

    # Static files with caching
    location /static/ {
        alias /opt/webseccheck/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        alias /opt/webseccheck/app/static/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Scan start endpoint — strict rate limiting
    location ~ ^/scan/start/ {
        limit_req zone=scan_start burst=2 nodelay;
        limit_req_status 429;
        include proxy_params;
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 60s;
    }

    # API endpoints — moderate rate limiting
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        include proxy_params;
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 30s;
    }

    # Admin area — restrict to trusted IPs if needed
    location /admin/ {
        limit_req zone=general burst=20 nodelay;
        # Uncomment and set to your admin IP to restrict access:
        # allow 192.168.1.0/24;
        # deny all;
        include proxy_params;
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 60s;
    }

    # All other routes
    location / {
        limit_req zone=general burst=30 nodelay;
        include proxy_params;
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 300s;
    }

    # Block hidden files and sensitive paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
    }
}
